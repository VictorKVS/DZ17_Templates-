{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EliteStore — Премиум магазин{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="app-header">
        <div class="container header-content">
            <a href="{% url 'store:product_list' %}" class="logo">🛒 EliteStore</a>
            <nav>
                <a href="{% url 'store:product_list' %}" class="nav-link">Каталог</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <div class="container">
            <p>&copy; {% now "Y" %} EliteStore. Архитектурно безупречно.</p>
        </div>
    </footer>
</body>
</html>
